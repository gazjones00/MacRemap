name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Swift version
        run: swift --version

      - name: Build app bundle
        run: ./scripts/build-app.sh

      - name: Create zip archive
        run: |
          cd .dist
          zip -r MacRemap.zip MacRemap.app

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: .dist/MacRemap.zip
